workflows:
  android-eas-apk:
    name: AI Studio Pro - APK via EAS
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
      groups:
        - keystore_credentials
        - expo_credentials
    scripts:
      - name: Install dependencies and fix
        script: |
          npm install
          # Forzamos la corrección de versiones que pide el error
          npx expo install --check
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Build APK with EAS locally
        script: |
          # Usamos --clear-cache para asegurar limpieza total
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./app-release.apk \
            --clear-cache
    artifacts:
      - app-release.apk
      - "*.apk"
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
