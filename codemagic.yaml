workflows:
  android-apk:
    name: AI Studio Pro - Production Build
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
    scripts:
      - name: Clean and Install
        script: |
          rm -rf node_modules
          rm -f package-lock.json
          npm install
      - name: Generate Android Project
        script: |
          # Generamos los archivos nativos de Android
          npx expo prebuild --platform android --clean
      - name: Compile Release APK
        script: |
          cd android
          # Limpiamos y compilamos en modo RELEASE (sin servidor Metro)
          ./gradlew clean
          ./gradlew assembleRelease
          # Buscamos el APK generado (puede ser app-release.apk o app-release-unsigned.apk)
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
