workflows:
  android-debug:
    name: AI Studio Pro - Fix Gradle
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Clean and Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean --non-interactive
      - name: Force Gradle Version
        script: |
          cd android
          # Esto obliga a usar Gradle 8.3, evitando el error de la versión 8.8
          ./gradlew wrapper --gradle-version 8.3
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
