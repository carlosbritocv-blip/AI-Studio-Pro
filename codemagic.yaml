workflows:
  android-eas-apk:
    name: AI Studio Pro - APK via EAS
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
      groups:
        - keystore_credentials
        - expo_credentials
    scripts:
      - name: Install dependencies and fix versions
        script: |
          npm install
          # Forzamos la actualización de módulos de Expo para Android
          npx expo install --fix
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Clean Android Gradle and Build
        script: |
          # Entramos en la carpeta de android si existe y limpiamos
          cd android && ./gradlew clean || echo "No android folder yet, skipping clean"
          cd ..
          # Ejecutamos el build con una bandera para ignorar avisos de versiones
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./app-release.apk
    artifacts:
      - app-release.apk
      - "*.apk"
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
