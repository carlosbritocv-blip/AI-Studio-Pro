workflows:
  android-apk:
    name: AI Studio Pro - Total Clean Build
    max_build_duration: 60
    environment:
      node: 18.20.0
      java: 17
    scripts:
      - name: Hard Clean and Install
        script: |
          # Borramos absolutamente todo lo antiguo
          rm -rf node_modules package-lock.json android
          npm cache clean --force
          npm install --legacy-peer-deps
      - name: Expo Prebuild
        script: |
          # Generamos la carpeta nativa desde cero
          npx expo prebuild --platform android --clean
      - name: Compile Release APK
        script: |
          # Aseguramos que Node esté accesible para el bundle
          export NODE_BINARY=$(command -v node)
          cd android
          ./gradlew clean
          # Compilamos ignorando errores de tipos para forzar el APK
          ./gradlew assembleRelease -x lint -x test
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
