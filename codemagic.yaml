workflows:
  android-apk:
    name: Ai Studio Pro APK Generator
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      groups:
        - expo
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
