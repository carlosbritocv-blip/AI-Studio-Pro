workflows:
  android-apk:
    name: AI Studio Pro - Final Fix
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
    scripts:
      - name: Clean and Install
        script: |
          rm -rf node_modules
          rm -f package-lock.json
          npm install
      - name: Generate Android Project
        script: |
          npx expo prebuild --platform android --clean
      - name: Manual JS Bundle
        script: |
          # Creamos la carpeta de recursos si no existe
          mkdir -p android/app/src/main/assets
          # Forzamos la creación del paquete de código para que no falle en Gradle
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      - name: Compile Release APK
        script: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
