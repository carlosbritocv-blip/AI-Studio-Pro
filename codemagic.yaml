workflows:
  android-apk:
    name: AI Studio Pro - Final Fix
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
    scripts:
      - name: Clean and Install
        script: |
          # Borramos cualquier rastro de instalaciones previas
          rm -rf node_modules
          rm -f package-lock.json
          npm install
      - name: Generate Android Project
        script: |
          # Generamos la carpeta nativa con la versión exacta de Kotlin
          npx expo prebuild --platform android --clean
      - name: Compile APK
        script: |
          cd android
          # Limpiamos Gradle antes de compilar
          ./gradlew clean
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../app-release.apk
    artifacts:
      - app-release.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
