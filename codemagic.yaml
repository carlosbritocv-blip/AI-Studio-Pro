workflows:
  android-debug:
    name: AI Studio Pro - APK Debug (sin firma)
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Fix Gradle version and properties
        script: |
          # Forzar Gradle 8.3
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradle.properties
          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          hermesEnabled=true
          EOF

          # local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          chmod +x android/gradlew

          # Parche: eliminar la línea hermesEnabled del app/build.gradle
          # que causa el error con Gradle moderno
          sed -i '/hermesEnabled/d' android/app/build.gradle

          # Parche: añadir configuración de Hermes compatible
          sed -i 's/project.ext.react = \[/project.ext.react = [\n    enableHermes: true,/' android/app/build.gradle || true
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true

  android-release:
    name: AI Studio Pro - APK Release (firmada)
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
      groups:
        - keystore_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Fix Gradle version and properties
        script: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          hermesEnabled=true
          EOF

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          chmod +x android/gradlew

          sed -i '/hermesEnabled/d' android/app/build.gradle
          sed -i 's/project.ext.react = \[/project.ext.react = [\n    enableHermes: true,/' android/app/build.gradle || true

          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
      - name: Build APK Release
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=/tmp/keystore.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
