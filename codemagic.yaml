workflows:
  android-apk:
    name: AI Studio Pro - Production Build
    max_build_duration: 60
    environment:
      node: 20.18.0  # Volvemos a 20, es mejor para Expo 51
      java: 17
    scripts:
      - name: Environment Setup
        script: |
          npm install -g expo-cli
          npm install --legacy-peer-deps
      - name: Clean and Prebuild
        script: |
          # Limpieza total de rastros antiguos
          rm -rf android
          # Forzamos la generación de la carpeta nativa
          npx expo prebuild --platform android --clean --no-install
      - name: Check Resources (Debug Step)
        script: |
          # Verificamos si los iconos existen antes de seguir
          if [ ! -d "android/app/src/main/res/mipmap-hdpi" ]; then
            echo "ERROR: Los iconos no se generaron. Revisa los nombres en assets/"
            exit 1
          fi
      - name: Build Android Release
        script: |
          export NODE_BINARY=$(command -v node)
          cd android
          # Usamos --no-daemon para ahorrar memoria en el servidor
          ./gradlew assembleRelease -x lint --no-daemon
          
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
