workflows:
  android-debug:
    name: AI Studio Pro - Android APK (Debug)
    max_build_duration: 60
    environment:
      node: 20.11.0
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean --non-interactive
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
