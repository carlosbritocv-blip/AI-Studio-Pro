workflows:
  android-apk:
    name: AI Studio Pro - Final Release
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
    scripts:
      - name: Install Dependencies
        script: |
          npm install
          # Instalamos el preset de Babel que le falta a tu proyecto
          npm install --save-dev babel-preset-expo
          
      - name: Create Babel Config
        script: |
          # Creamos el archivo de configuración de Babel al vuelo para que Metro no se estrelle
          echo "module.exports = function(api) { api.cache(true); return { presets: ['babel-preset-expo'] }; };" > babel.config.js
          
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
          
      - name: Prepare Assets Folder
        script: |
          mkdir -p android/app/src/main/assets
          
      - name: Compile Release APK
        script: |
          export NODE_BINARY=$(command -v node)
          cd android
          ./gradlew clean
          ./gradlew assembleRelease -x lint
          
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
