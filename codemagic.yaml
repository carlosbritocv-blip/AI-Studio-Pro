workflows:
  android-eas-apk:
    name: AI Studio Pro - APK via EAS
    max_build_duration: 60
    environment:
      # Subimos a 20.18.0 para cumplir con el requisito de >20.12.0
      node: 20.18.0 
      java: 17
      groups:
        - keystore_credentials
        - expo_credentials
    scripts:
      - name: Install dependencies and fix versions
        script: |
          npm install
          # Esta línea es la clave: fuerza a actualizar las librerías que dan error
          npx expo install --fix
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Login to Expo
        script: |
          eas whoami
      - name: Build APK with EAS locally
        script: |
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./app-release.apk
    artifacts:
      - app-release.apk
      - "*.apk"
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
