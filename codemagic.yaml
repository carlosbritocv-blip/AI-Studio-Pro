workflows:
  android-debug:
    name: AI Studio Pro - Final Fix
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean --non-interactive
      - name: Force Fix Namespaces & SDK
        script: |
          # Esto busca CUALQUIER build.gradle y le inyecta el namespace si no lo tiene
          find android -name "build.gradle" -exec sed -i '' '/android {/a \
          \    namespace "com.aistudiopro.fix" \
          \    compileSdkVersion 34' {} + || true
          
          # Forzamos la versión del buildTools para que coincida con lo que pide el log
          echo "android.experimental.privacySandboxSdk.enable=false" >> android/gradle.properties
          echo "android.nonTransitiveRClass=false" >> android/gradle.properties
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.android.useAndroidX=true -Dorg.gradle.project.android.enableJetifier=true
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
