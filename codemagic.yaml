workflows:
  android-debug:
    name: AI Studio Pro - Force Namespace
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean --non-interactive
      - name: Patch Android Namespaces
        script: |
          # Este comando busca archivos build.gradle que no tengan namespace y les asigna uno genérico para que no fallen
          find android -name "build.gradle" -exec sed -i '' '/android {/a \
          \    namespace "com.aistudiopro.fix"' {} + || true
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.android.useAndroidX=true
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
