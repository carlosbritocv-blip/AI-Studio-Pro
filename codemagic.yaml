workflows:
  android-apk:
    name: AI Studio Pro Build
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
    scripts:
      - name: Install and Fix Sharp
        script: |
          npm install --legacy-peer-deps
          # Forzamos la instalación de la arquitectura correcta de sharp para Linux
          npm install --platform=linux --arch=x64 sharp
      - name: Prebuild resources
        script: |
          rm -rf android
          # Generamos la carpeta nativa y los iconos
          npx expo prebuild --platform android --clean --no-install
      - name: Verify Icons (Si esto falla, el log nos dirá por qué)
        script: |
          ls -R android/app/src/main/res/mipmap-* || echo "ICONOS NO GENERADOS"
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease -x lint --no-daemon
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro.apk
    artifacts:
      - AI-Studio-Pro.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
