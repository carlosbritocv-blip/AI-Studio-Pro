workflows:
  android-debug:
    name: AI Studio Pro - APK Debug
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Fix Gradle version and properties
        script: |
          chmod +x android/gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

          # Gradle 7.6.4 — única versión 100% compatible con expo-modules-core en Expo 51
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.4-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=false
          hermesEnabled=true
          EOF
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true

  android-release:
    name: AI Studio Pro - APK Release (firmada)
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
      groups:
        - keystore_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Fix Gradle version and properties
        script: |
          chmod +x android/gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.4-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=false
          hermesEnabled=true
          EOF

          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
      - name: Build APK Release
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=/tmp/keystore.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
