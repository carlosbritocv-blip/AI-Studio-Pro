workflows:
  android-apk:
    name: AI Studio Pro - Final Release
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
    scripts:
      - name: Hard Install
        script: |
          # Instalamos dependencias y forzamos la herramienta de imagen
          npm install
          npm install -g sharp-cli
      - name: Clean and Prebuild
        script: |
          # Borramos cualquier rastro de la carpeta android antigua
          rm -rf android
          # Generamos el código nativo forzando la creación de recursos
          npx expo prebuild --platform android --clean
      - name: Compile Release APK
        script: |
          export NODE_BINARY=$(command -v node)
          cd android
          # Limpiamos caché de Gradle antes de empezar
          ./gradlew clean
          ./gradlew assembleRelease -x lint
          
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
