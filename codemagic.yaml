workflows:
  android-apk:
    name: AI Studio Pro - Final Build
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
    scripts:
      - name: Install Sharp and Dependencies
        script: |
          # Instalamos sharp globalmente para que Expo pueda procesar los iconos
          npm install -g sharp-cli
          npm install --legacy-peer-deps
      - name: Force Expo Prebuild
        script: |
          # Borramos cualquier rastro previo para evitar conflictos de recursos
          rm -rf android
          # Generamos la carpeta nativa limpia
          npx expo prebuild --platform android --clean --no-install
      - name: Build Android APK
        script: |
          export NODE_BINARY=$(command -v node)
          cd android
          # Limpiamos caché de Gradle antes de compilar
          ./gradlew clean
          ./gradlew assembleRelease -x lint --no-daemon
          
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
