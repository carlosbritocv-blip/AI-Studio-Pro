workflows:
  android-debug:
    name: AI Studio Pro - Debug
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean --non-interactive
      - name: Fix Gradle Permissions & Memory
        script: |
          cd android
          chmod +x gradlew
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
