workflows:
  android-debug:
    name: AI Studio Pro - Debug
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Clean and Prebuild
        script: |
          # Borramos cualquier rastro de configuraciones viejas
          rm -rf android
          npx expo prebuild --platform android --clean --non-interactive
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          # Usamos este comando para ignorar las advertencias de versiones que viste en el log
          ./gradlew assembleDebug -Dorg.gradle.project.android.useAndroidX=true -Dorg.gradle.project.android.enableJetifier=true --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
