workflows:
  android-debug:
    name: AI Studio Pro - Build Final
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean --non-interactive
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          # Usamos propiedades directas de Gradle para saltarnos los errores de Namespace y SDK
          ./gradlew assembleDebug \
            -Dorg.gradle.project.android.useAndroidX=true \
            -Dorg.gradle.project.android.enableJetifier=true \
            -Dorg.gradle.project.android.nonTransitiveRClass=false \
            --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
