workflows:
  android-debug:
    name: AI Studio Pro - Total Clean
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
    scripts:
      - name: Force Clean Cache & Environment
        script: |
          # Borramos carpetas de caché de Gradle y NPM manualmente
          rm -rf ~/.gradle/caches
          rm -rf ~/.npm
          rm -rf android
          rm -rf node_modules
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean --non-interactive
      - name: Patch Namespaces
        script: |
          # Corregimos el error de "Namespace not specified" de tus capturas
          find android -name "build.gradle" -exec sed -i '' '/android {/a \
          \    namespace "com.aistudiopro.fix"' {} + || true
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.cache.mode=rebuild
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
