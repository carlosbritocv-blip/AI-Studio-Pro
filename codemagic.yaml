workflows:
  android-eas-apk:
    name: AI Studio Pro - APK via EAS
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
      groups:
        - keystore_credentials
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Fix Kotlin Version and Install EAS
        script: |
          # Instalamos EAS
          npm install -g eas-cli
          # Forzamos la versión de Kotlin en todo el proyecto antes de compilar
          export KOTLIN_VERSION=1.9.24
      - name: Build APK with EAS locally
        script: |
          # Usamos env vars para forzar a Gradle a usar Kotlin moderno
          EAS_NO_VCS=1 \
          KOTLIN_VERSION=1.9.24 \
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./app-release.apk \
            --clear-cache
    artifacts:
      - app-release.apk
      - "*.apk"
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
