workflows:
  android-apk:
    name: AI Studio Pro - Final Release
    max_build_duration: 60
    environment:
      node: 20.18.0 
      java: 17
    scripts:
      - name: Install Dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          # Generamos la carpeta android limpia
          npx expo prebuild --platform android --clean
      - name: Prepare Assets Folder
        script: |
          # Creamos la carpeta de assets manualmente para evitar el error de Gradle
          mkdir -p android/app/src/main/assets
      - name: Compile Release APK
        script: |
          export NODE_BINARY=$(command -v node)
          cd android
          # Limpiamos y compilamos
          ./gradlew clean
          ./gradlew assembleRelease -x lint
          
          # Copiamos el APK generado a la raíz
          cp app/build/outputs/apk/release/*.apk ../AI-Studio-Pro-Final.apk
    artifacts:
      - AI-Studio-Pro-Final.apk
    publishing:
      email:
        recipients:
          - carlosbrito.cv@gmail.com
        notify:
          success: true
          failure: true
